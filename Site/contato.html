<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100;0,300;0,400;0,500;0,700;0,900;1,100;1,300;1,400;1,500;1,700;1,900&display=swap"
        rel="stylesheet">
    <title>Jogoteca</title>
    <!-- Link do css -->
    <link rel="stylesheet" href="./Css/style.css">
    <link rel="stylesheet" href="./Css/contato-style.css">
    <link rel="shortcut icon" href="./Imagens/PassatempoLogoSemTexto.png">
</head>

<body>
    <header>
        <nav>
            <div class="imagemNav">
                <img src="./Imagens/PassatempoLogoComTexto.png" alt="Logo da Jogoteca" height="80">
            </div>
            <div class="cabecalho">
                <ul>
                    <li><a href="./index.html">Jogoteca</a></li>
                    <li><a href="./catalogo.html">Catálogo</a></li>
                    <li><a href="./contato.html">Contato</a></li>
                </ul>
            </div>
        </nav>
    </header>
    <main>
        <h1 class="titulo">Contato</h1>
        <form>
            <div class="forms">
                <h2>Nome Completo</h2>
                <textarea type="text" name="nome" id="nome" required></textarea>
            </div>
            <div>
                <h2>E-mail</h2>
                <textarea type="email" name="email" id="email" required></textarea>
            </div>
            <div>
                <h2>Mensagem</h2>
                <textarea name="msg" id="msg" cols="30" rows="10"></textarea>
            </div>
            <div class="btn-env">
                <button class="enviar">Enviar</button>
            </div>
        </form>
    </main>
    <footer>
        <ul>
            <li><a href=""><img src="./Imagens/insta.png" height="100px"></a></li>
            <li><a href=""><img src="./Imagens/face.png" height="100px"></a></li>
            <li><a href=""><img src="./Imagens/whats.png" height="100px"></a></li>
            <li><a href=""><img src="./Imagens/youtube.png" height="100px"></a></li>
            <li><a href=""><img src="./Imagens/twitter.png" height="100px"></a></li>
        </ul>
        <h2>Copyright © 2024 | Passatempo Educativo</h2>
    </footer>
</body>
